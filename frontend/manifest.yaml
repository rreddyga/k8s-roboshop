apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend
  namespace: roboshop
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log notice;
    pid /run/nginx.pid;

    include /usr/share/nginx/modules/*.conf;

    events {
        worker_connections 1024;
    }

    http {
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

        access_log  /var/log/nginx/access.log  main;

        sendfile            on;
        tcp_nopush          on;
        keepalive_timeout   65;
        types_hash_max_size 4096;

        include             /etc/nginx/mime.types;
        default_type        application/octet-stream;

        include /etc/nginx/conf.d/*.conf;

        server {
            listen       80;
            listen       [::]:80;
            server_name  _;
            root         /usr/share/nginx/html;

            include /etc/nginx/default.d/*.conf;

            error_page 404 /404.html;
            location = /404.html {
            }

            error_page 500 502 503 504 /50x.html;
            location = /50x.html {
            }

            location /images/ {
              expires 5s;
              root   /usr/share/nginx/html;
              try_files $uri /images/placeholder.jpg;
            }
            location /api/catalogue/ { proxy_pass http://catalogue:8080/; }
            location /api/user/ { proxy_pass http://user:8080/; }
            location /api/cart/ { proxy_pass http://cart:8080/; }
            location /api/shipping/ { proxy_pass http://shipping:8080/; }
            location /api/payment/ { proxy_pass http://payment:8080/; }

            location /health {
              stub_status on;
              access_log off;
            }

        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: roboshop
  #these are required labels for replicaset to identify the pods it manages. 
  #These labels should match the labels defined in the pod template.
  labels:
    project: roboshop
    component: frontend
    environment: dev

spec:
  replicas: 1 #number of pod replicas to be maintained
  selector:
    #using these labels the replicaset will identify the pods it manages.
    matchLabels:
      project: roboshop
      component: frontend
      environment: dev
  #This is the pod template which defines the pod specification. 
  #The deployment will create pods based on this template.
  template:
    metadata:
      labels:
        project: roboshop
        component: frontend
        environment: dev
    #This is the pod specification which defines the containers and volumes for the pod.
    spec:
      #volumes is used to define the volumes for the pod. In this case, we are using a configmap volume 
      #to mount the nginx configuration file.
      volumes:
      - name: nginx-config
        configMap:
          name: frontend
      containers:
      - name: frontend
        image: rreddygang/frontend:1.4.2x                               vvv
        #imagepullpolicy is used to specify when to pull the image.
        imagePullPolicy: Always
        # Define resource limits and requests for the container
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        #readinessProbe is used to check if the application is ready to serve traffic. 
        #It checks the TCP socket on port 8080. If the application is not ready, 
        #it will not receive traffic from the service.
        readinessProbe:
          # Checks the TCP socket on port 8080 to determine if the application is ready to serve traffic.
          tcpSocket:
            port: 80
          failureThreshold: 2
          periodSeconds: 10
          #initialDelaySeconds is the time to wait before starting the readiness probe.
          initialDelaySeconds: 15
        #livenessProbe is used to check if the application is alive.
        livenessProbe:
          httpGet:
            path: /
            port: 80
          failureThreshold: 2
          periodSeconds: 10
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: roboshop
  labels:
    project: roboshop
    component: frontend
    environment: dev
spec:
  type: LoadBalancer
  selector:
    #by default the service type is ClusterIP. It exposes the service on a cluster-internal IP.
    #label are used as a selectors to select the pods which are running nginx.
    project: roboshop
    component: frontend
    environment: dev
  ports:
  - protocol: TCP
    port: 80 # service port
    targetPort: 80 # container port

#kubens installation is required to switch between namespaces.
#after installing kubens, run the command kubens roboshop to switch to the roboshop namespace.
# run this command-> kubens roboshop
#if you want to switch to default namespace, run the command-> kubens default

#install k9s to monitor the resources in the namespace. 
#It is a terminal based UI to manage Kubernetes clusters. 
#It provides a graphical interface to view and manage the resources in the cluster. 
#It also provides a way to view the logs of the pods and execute commands in the pods.
